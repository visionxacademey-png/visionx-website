<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- Basic SEO -->
  <title>VisionX | Software Development, Cybersecurity & Tech Solutions</title>

  <meta name="description"
    content="VisionX is a leading technology company providing software development, cybersecurity solutions, internships, workshops, and innovative digital products. Recognized by Kerala Startup Mission and Startup India." />

  <meta name="keywords"
    content="VisionX, software development company, cybersecurity company, tech internships, engineering workshops, startup kerala, software solutions, web development company india" />

  <meta name="author" content="VisionX" />

  <!-- Mobile Optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://visionx.com/" />

  <!-- Favicon -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <!-- Open Graph (For Facebook, LinkedIn) -->
  <meta property="og:title" content="VisionX | Software Development & Cybersecurity Solutions" />
  <meta property="og:description"
    content="VisionX provides innovative software solutions, cybersecurity services, internships, and workshops for future engineers." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://visionx.com/" />
  <meta property="og:image" content="https://visionx.com/preview.png" />

  <!-- Twitter SEO -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="VisionX | Software Development & Cybersecurity" />
  <meta name="twitter:description"
    content="Innovative software development, cybersecurity solutions, and technical internships by VisionX." />
  <meta name="twitter:image" content="https://visionx.com/preview.png" />

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Structured Data for Google -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "VisionX",
    "url": "https://visionx.com",
    "logo": "https://visionx.com/logo.png",
    "description": "VisionX provides software development, cybersecurity solutions, workshops, and internships.",
    "sameAs": [
      "https://www.linkedin.com/company/visionx",
      "https://www.instagram.com/visionx",
      "https://www.facebook.com/visionx"
    ]
  }
  </script>

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
